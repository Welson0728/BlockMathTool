<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Base Ten Blocks Tool EN ZH BM</title>

  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      min-height: 100dvh;
      background: #f2f2f2;
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
      user-select: none;
    }

    .tool {
      width: min(96vw, 1120px);
      height: 100dvh;
      margin: 0 auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .top-panel {
      position: relative;
      min-height: 96px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .display {
      width: 100%;
      padding: 0 110px;
      text-align: center;
      color: #222;
      line-height: 1.12;
    }

    .number-line {
      font-size: clamp(42px, 7vw, 72px);
      font-weight: 800;
      letter-spacing: 3px;
    }

    .word-line {
      margin-top: 5px;
      min-height: 28px;
      font-size: clamp(18px, 2.6vw, 26px);
      font-weight: 800;
      line-height: 1.2;
      letter-spacing: .3px;
      overflow-wrap: anywhere;
      padding: 0 6px;
    }

    .word-line.hidden {
      display: none;
    }

    .lang-switch {
      position: absolute;
      right: 0;
      top: 8px;
      display: flex;
      gap: 5px;
      z-index: 100;
      background: #ffffff;
      padding: 5px;
      border-radius: 13px;
      box-shadow: 0 2px 8px rgba(0,0,0,.10);
    }

    .lang-btn {
      min-width: 42px;
      height: 34px;
      border-radius: 10px;
      border: 2px solid #222;
      background: #fff;
      color: #111;
      font-size: 14px;
      font-weight: 900;
      cursor: pointer;
    }

    .lang-btn.active {
      background: #222;
      color: #fff;
    }

    .speak-btn {
      min-width: 42px;
      height: 34px;
      border-radius: 10px;
      border: 2px solid #222;
      background: #fff;
      color: #111;
      font-size: 15px;
      font-weight: 900;
      cursor: pointer;
      padding: 5px 8px;
    }

    .speak-btn:active {
      transform: scale(.98);
    }


    .main-area {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: 150px 1fr;
      gap: 12px;
    }

    .tray {
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 2px 10px rgba(0,0,0,.08);
      padding: 10px;
      display: grid;
      grid-template-columns: 1fr;
      align-content: start;
      gap: 10px;
      overflow-y: auto;
      touch-action: none;
    }

    .source-card {
      display: grid;
      place-items: center;
      gap: 4px;
      padding: 8px 4px;
      border-radius: 14px;
      border: 2px solid #ececec;
      background: #fff;
      font-weight: 800;
      font-size: 17px;
      color: #222;
      cursor: grab;
      touch-action: none;
    }

    .source-card:active {
      cursor: grabbing;
      transform: scale(.98);
    }

    .source-img {
      width: 72px;
      height: 72px;
      object-fit: contain;
      pointer-events: none;
    }

    .workspace {
      position: relative;
      min-height: 0;
      border: 3px dashed #c9c9c9;
      border-radius: 18px;
      background: #fff;
      overflow: hidden;
      touch-action: none;
    }

    .workspace-reset {
      position: absolute;
      right: 12px;
      bottom: 12px;
      z-index: 80;
      font-size: 14px;
      font-weight: 800;
      padding: 8px 14px;
      border-radius: 12px;
      border: 2px solid #333;
      background: #ffffff;
      color: #111;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,.12);
    }

    .workspace-reset:active {
      transform: scale(.98);
    }

    .hint {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: #b5b5b5;
      font-size: clamp(20px, 3vw, 34px);
      font-weight: 800;
      pointer-events: none;
      text-align: center;
      padding: 20px;
    }

    .block {
      position: absolute;
      object-fit: contain;
      touch-action: none;
      cursor: grab;
      z-index: 5;
    }

    .block:active {
      cursor: grabbing;
      z-index: 20;
    }

    /* PC dragged block size */
    .block.thousand { width: 172px; height: 172px; }
    .block.hundred { width: 153px; height: 153px; }

    /* 10 block is horizontal and specially larger */
    .block.ten { width: 140px; height: 38px; }

    .block.one { width: 58px; height: 58px; }

    .ghost {
      position: fixed;
      pointer-events: none;
      object-fit: contain;
      opacity: .9;
      z-index: 999;
      transform: translate(-50%, -50%);
    }

    @media (max-width: 700px) {
      .tool {
        width: 100vw;
        padding: 8px;
        gap: 8px;
      }

      .top-panel {
        min-height: 118px;
        flex-direction: column;
        justify-content: center;
        gap: 6px;
      }

      .display {
        padding: 0 6px;
      }

      .number-line {
        font-size: clamp(42px, 12vw, 62px);
      }

      .word-line {
        font-size: clamp(17px, 5vw, 22px);
        min-height: 24px;
        line-height: 1.2;
      }

      /*
        Mobile fix:
        Put EN / ZH / BM above the number.
      */
      .lang-switch {
        position: static;
        right: auto;
        top: auto;
        order: -1;
        margin: 0 auto;
        gap: 4px;
        padding: 4px;
      }

      .lang-btn {
        min-width: 46px;
        height: 31px;
        font-size: 13px;
        padding: 5px 10px;
      }

      .speak-btn {
        min-width: 38px;
        height: 31px;
        font-size: 14px;
        padding: 5px 8px;
      }

      .main-area {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column-reverse;
        gap: 8px;
      }

      .tray {
        flex: 0 0 112px;
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: flex-start;
        gap: 8px;
        overflow-x: auto;
        overflow-y: hidden;
        padding: 8px;
      }

      .source-card {
        min-width: 78px;
        height: 94px;
        font-size: 15px;
        padding: 6px;
      }

      .source-img {
        width: 54px;
        height: 54px;
      }

      .workspace {
        flex: 1;
        min-height: 280px;
      }

      .workspace-reset {
        right: 10px;
        bottom: 10px;
        font-size: 13px;
        padding: 7px 12px;
      }

      /* Mobile dragged block size */
      .block.thousand { width: 140px; height: 140px; }
      .block.hundred { width: 125px; height: 125px; }

      /* Mobile 10 block: wider and clearer */
      .block.ten { width: 112px; height: 32px; }

      .block.one { width: 50px; height: 50px; }
    }
  </style>
</head>

<body>
  <main class="tool">
    <section class="top-panel">
      <div class="lang-switch" aria-label="Language switch">
        <button class="lang-btn active" type="button" data-lang="en">EN</button>
        <button class="lang-btn" type="button" data-lang="zh">ZH</button>
        <button class="lang-btn" type="button" data-lang="bm">BM</button>
        <button class="speak-btn" id="speakBtn" type="button" aria-label="Speak">🔊</button>
      </div>

      <div class="display">
        <div class="number-line" id="numberDisplay">0</div>
        <div class="word-line hidden" id="wordDisplay"></div>
      </div>
    </section>

    <section class="main-area">
      <section class="tray">
        <div class="source-card" data-type="thousand" data-value="1000">
          <img class="source-img" src="assets/thousand.png" onerror="this.src='assets/thousand.svg'" alt="1000 block" />
          <span>1000</span>
        </div>

        <div class="source-card" data-type="hundred" data-value="100">
          <img class="source-img" src="assets/hundred.png" onerror="this.src='assets/hundred.svg'" alt="100 block" />
          <span>100</span>
        </div>

        <div class="source-card" data-type="ten" data-value="10">
          <img class="source-img" src="assets/ten.png" onerror="this.src='assets/ten.svg'" alt="10 block" />
          <span>10</span>
        </div>

        <div class="source-card" data-type="one" data-value="1">
          <img class="source-img" src="assets/one.png" onerror="this.src='assets/one.svg'" alt="1 block" />
          <span>1</span>
        </div>
      </section>

      <section class="workspace" id="workspace">
        <div class="hint" id="hint">Drag blocks here</div>
        <button class="workspace-reset" id="resetBtn" type="button">Reset</button>
      </section>
    </section>
  </main>

  <script>
    const workspace = document.getElementById("workspace");
    const display = document.getElementById("numberDisplay");
    const wordDisplay = document.getElementById("wordDisplay");
    const hint = document.getElementById("hint");
    const resetBtn = document.getElementById("resetBtn");
    const speakBtn = document.getElementById("speakBtn");
    const sources = document.querySelectorAll(".source-card[data-type]");
    const langButtons = document.querySelectorAll(".lang-btn");

    let total = 0;
    let currentDrag = null;
    let currentLang = "en";
    let currentAudio = null;
    let bmAudioToken = 0;
    const placedBlocks = [];

    const languageData = {
      en: {
        words: numberToEnglish,
        speechLang: "en-US"
      },
      zh: {
        words: numberToChinese,
        speechLang: "zh-CN"
      },
      bm: {
        words: numberToMalay,
        speechLang: "ms-MY"
      }
    };

    langButtons.forEach(button => {
      button.addEventListener("click", () => {
        setLanguage(button.dataset.lang);
      });
    });

    function setLanguage(lang) {
      stopAllAudio();
      currentLang = lang;

      langButtons.forEach(button => {
        button.classList.toggle("active", button.dataset.lang === lang);
      });

      wordDisplay.classList.remove("hidden");
      updateDisplay();
    }

    sources.forEach(source => source.addEventListener("pointerdown", startFromSource));
    function startFromSource(e) {
      e.preventDefault();

      const source = e.currentTarget;
      const type = source.dataset.type;
      const value = Number(source.dataset.value);
      const img = source.querySelector("img");

      const ghost = document.createElement("img");
      ghost.src = img.currentSrc || img.src;
      ghost.className = "ghost";
      setGhostSize(ghost, type);
      document.body.appendChild(ghost);

      currentDrag = { mode: "new", pointerId: e.pointerId, type, value, ghost };
      moveGhost(e.clientX, e.clientY);

      source.setPointerCapture(e.pointerId);
      source.addEventListener("pointermove", onSourcePointerMove);
      source.addEventListener("pointerup", onSourcePointerUp);
      source.addEventListener("pointercancel", onSourcePointerUp);
    }

    function setGhostSize(ghost, type) {
      const small = window.matchMedia("(max-width: 700px)").matches;
      const size = {
        thousand: small ? ["140px", "140px"] : ["172px", "172px"],
        hundred: small ? ["125px", "125px"] : ["153px", "153px"],
        ten: small ? ["112px", "32px"] : ["140px", "38px"],
        one: small ? ["50px", "50px"] : ["58px", "58px"]
      }[type];

      ghost.style.width = size[0];
      ghost.style.height = size[1];
    }

    function onSourcePointerMove(e) {
      if (!currentDrag) return;
      moveGhost(e.clientX, e.clientY);
    }

    function onSourcePointerUp(e) {
      if (!currentDrag) return;

      const source = e.currentTarget;
      source.removeEventListener("pointermove", onSourcePointerMove);
      source.removeEventListener("pointerup", onSourcePointerUp);
      source.removeEventListener("pointercancel", onSourcePointerUp);

      const rect = workspace.getBoundingClientRect();
      const isInside =
        e.clientX >= rect.left &&
        e.clientX <= rect.right &&
        e.clientY >= rect.top &&
        e.clientY <= rect.bottom;

      if (isInside) {
        addBlock(currentDrag.type, currentDrag.value, e.clientX - rect.left, e.clientY - rect.top);
      }

      currentDrag.ghost.remove();
      currentDrag = null;
    }

    function moveGhost(x, y) {
      if (!currentDrag || !currentDrag.ghost) return;
      currentDrag.ghost.style.left = x + "px";
      currentDrag.ghost.style.top = y + "px";
    }

    function addBlock(type, value, x, y) {
      const block = document.createElement("img");
      block.src = `assets/${type}.png`;
      block.onerror = () => block.src = `assets/${type}.svg`;
      block.className = `block ${type}`;
      block.dataset.value = value;

      workspace.appendChild(block);

      requestAnimationFrame(() => {
        const maxX = workspace.clientWidth - block.offsetWidth;
        const maxY = workspace.clientHeight - block.offsetHeight;

        block.style.left = clamp(x - block.offsetWidth / 2, 0, maxX) + "px";
        block.style.top = clamp(y - block.offsetHeight / 2, 0, maxY) + "px";
      });

      block.addEventListener("pointerdown", startMoveExisting);
      placedBlocks.push(block);
      total += value;
      updateDisplay();
    }

    function startMoveExisting(e) {
      e.preventDefault();

      const block = e.currentTarget;
      const rect = workspace.getBoundingClientRect();
      const blockRect = block.getBoundingClientRect();

      currentDrag = {
        mode: "move",
        block,
        offsetX: e.clientX - blockRect.left,
        offsetY: e.clientY - blockRect.top,
        workspaceRect: rect
      };

      block.setPointerCapture(e.pointerId);
      block.addEventListener("pointermove", moveExisting);
      block.addEventListener("pointerup", stopMoveExisting);
      block.addEventListener("pointercancel", stopMoveExisting);
    }

    function moveExisting(e) {
      if (!currentDrag || currentDrag.mode !== "move") return;

      const { block, offsetX, offsetY, workspaceRect } = currentDrag;
      const maxX = workspace.clientWidth - block.offsetWidth;
      const maxY = workspace.clientHeight - block.offsetHeight;

      block.style.left = clamp(e.clientX - workspaceRect.left - offsetX, 0, maxX) + "px";
      block.style.top = clamp(e.clientY - workspaceRect.top - offsetY, 0, maxY) + "px";
    }

    function stopMoveExisting(e) {
      const block = e.currentTarget;
      block.removeEventListener("pointermove", moveExisting);
      block.removeEventListener("pointerup", stopMoveExisting);
      block.removeEventListener("pointercancel", stopMoveExisting);
      currentDrag = null;
    }

    function reset() {
      stopAllAudio();
      placedBlocks.splice(0).forEach(block => block.remove());
      total = 0;
      updateDisplay();
    }

    function updateDisplay() {
      display.textContent = total.toString();
      wordDisplay.textContent = languageData[currentLang].words(total);
      hint.style.display = total === 0 ? "grid" : "none";
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function numberToEnglish(n) {
      if (n === 0) return "zero";

      const ones = ["zero", "one", "two", "three", "four", "five", "six", "seven", "eight", "nine",
                    "ten", "eleven", "twelve", "thirteen", "fourteen", "fifteen", "sixteen",
                    "seventeen", "eighteen", "nineteen"];
      const tens = ["", "", "twenty", "thirty", "forty", "fifty", "sixty", "seventy", "eighty", "ninety"];

      function under100(num) {
        if (num < 20) return ones[num];
        const t = Math.floor(num / 10);
        const o = num % 10;
        return tens[t] + (o ? " " + ones[o] : "");
      }

      function under1000(num) {
        if (num < 100) return under100(num);
        const h = Math.floor(num / 100);
        const rest = num % 100;
        return ones[h] + " hundred" + (rest ? " " + under100(rest) : "");
      }

      const scales = [
        { value: 1000000000, word: "billion" },
        { value: 1000000, word: "million" },
        { value: 1000, word: "thousand" }
      ];

      for (const scale of scales) {
        if (n >= scale.value) {
          const high = Math.floor(n / scale.value);
          const rest = n % scale.value;
          return numberToEnglish(high) + " " + scale.word + (rest ? " " + numberToEnglish(rest) : "");
        }
      }

      return under1000(n);
    }

    function numberToMalay(n) {
      if (n === 0) return "sifar";

      const ones = ["sifar", "satu", "dua", "tiga", "empat", "lima", "enam", "tujuh", "lapan", "sembilan"];

      function under100(num) {
        if (num < 10) return ones[num];
        if (num === 10) return "sepuluh";
        if (num === 11) return "sebelas";
        if (num < 20) return ones[num - 10] + " belas";

        const puluh = Math.floor(num / 10);
        const sa = num % 10;
        return ones[puluh] + " puluh" + (sa ? " " + ones[sa] : "");
      }

      function under1000(num) {
        if (num < 100) return under100(num);

        const ratus = Math.floor(num / 100);
        const baki = num % 100;

        // Place-value style for teaching:
        // 100 = satu ratus, not seratus
        let text = ones[ratus] + " ratus";
        if (baki > 0) text += " " + under100(baki);
        return text;
      }

      function underMillion(num) {
        if (num < 1000) return under1000(num);

        const ribu = Math.floor(num / 1000);
        const baki = num % 1000;

        // Place-value style for teaching:
        // 1000 = satu ribu, not seribu
        let text = under1000(ribu) + " ribu";
        if (baki > 0) text += " " + under1000(baki);
        return text;
      }

      if (n < 1000000) return underMillion(n);

      const juta = Math.floor(n / 1000000);
      const baki = n % 1000000;

      // Place-value style:
      // 1000000 = satu juta, not sejuta
      let text = underMillion(juta) + " juta";
      if (baki > 0) text += " " + underMillion(baki);
      return text;
    }

    function numberToChinese(n) {
      if (n === 0) return "零";

      const digit = ["零", "一", "二", "三", "四", "五", "六", "七", "八", "九"];
      const bigUnits = ["", "万", "亿", "兆"];

      function sectionToChinese(num) {
        const values = [1000, 100, 10, 1];
        const units = ["千", "百", "十", ""];
        let text = "";
        let zeroPending = false;

        for (let i = 0; i < values.length; i++) {
          const value = values[i];
          const d = Math.floor(num / value) % 10;
          const hasLowerNumber = num % value !== 0;

          if (d === 0) {
            if (text !== "" && hasLowerNumber) {
              zeroPending = true;
            }
            continue;
          }

          if (zeroPending) {
            text += "零";
            zeroPending = false;
          }

          // 10-19 at the beginning reads 十, 十一, 十二...
          if (value === 10 && d === 1 && text === "") {
            text += "十";
          } else {
            text += digit[d] + units[i];
          }
        }

        return text;
      }

      let sections = [];
      let temp = n;

      while (temp > 0) {
        sections.push(temp % 10000);
        temp = Math.floor(temp / 10000);
      }

      let result = "";
      let skippedZeroSection = false;

      for (let i = sections.length - 1; i >= 0; i--) {
        const section = sections[i];

        if (section === 0) {
          if (result !== "") skippedZeroSection = true;
          continue;
        }

        /*
          Correct zero rule:
          Add 零 before a lower section only when:
          1. A whole 0000 section was skipped, or
          2. This lower section is below 1000, meaning it has leading zeros.

          Example:
          22266 = 二万二千二百六十六  ✅ no 零
          20266 = 二万零二百六十六    ✅ need 零
          20006 = 二万零六            ✅ need 零
        */
        if (result !== "" && (skippedZeroSection || section < 1000)) {
          result += "零";
        }

        result += sectionToChinese(section) + bigUnits[i];
        skippedZeroSection = false;
      }

      return result;
    }


    resetBtn.addEventListener("click", reset);
    resetBtn.addEventListener("pointerdown", e => e.stopPropagation());

    // Preload common BM audio files so phone playback feels faster after the page opens.
    const bmCommonAudioWords = [
      "sifar", "satu", "dua", "tiga", "empat", "lima", "enam", "tujuh", "lapan", "sembilan",
      "sepuluh", "sebelas", "belas", "puluh", "ratus", "ribu", "juta"
    ];
    const bmAudioUrlCache = new Map();

    function getBmAudioCandidatePaths(name) {
      const forms = makeMalayFileNameVariants(name, true);
      const extensions = [".MP3", ".mp3", ".Mp3"];
      const paths = [];

      for (const form of forms) {
        for (const ext of extensions) {
          paths.push(`assets/audio/bm/${form}${ext}`);
        }
      }

      return paths;
    }

    function preloadMalayAudio() {
      bmCommonAudioWords.forEach(word => {
        getBmAudioCandidatePaths(word).forEach(src => {
          const audio = new Audio();
          audio.preload = "auto";
          audio.src = src;
          audio.load();
        });
      });
    }

    // Android / iPhone usually allows better loading after first touch.
    window.addEventListener("load", () => {
      setTimeout(preloadMalayAudio, 300);
    }, { once: true });

    document.addEventListener("pointerdown", () => {
      preloadMalayAudio();
    }, { once: true });

    speakBtn.addEventListener("click", speakCurrentAnswer);

    async function speakCurrentAnswer() {
      const text = languageData[currentLang].words(total);
      if (!text) return;

      // BM uses your own Malaysia Malay MP3 files from assets/audio/bm/
      if (currentLang === "bm") {
        window.speechSynthesis?.cancel();
        await playMalayMp3Sequence(text);
        return;
      }

      // EN and ZH use browser TTS.
      if (!("speechSynthesis" in window)) return;

      window.speechSynthesis.cancel();

      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = languageData[currentLang].speechLang;
      utterance.voice = getPreferredVoice(currentLang);

      if (currentLang === "zh") {
        utterance.rate = 0.85;
        utterance.pitch = 1.05;
      } else {
        // EN voice tuning only.
        // Slower and softer than before, so it sounds less robotic.
        utterance.rate = 0.88;
        utterance.pitch = 1.05;
      }

      window.speechSynthesis.speak(utterance);
    }

    function stopAllAudio() {
      bmAudioToken++;
      if (currentAudio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
      }
      window.speechSynthesis?.cancel();
    }

    async function playMalayMp3Sequence(text) {
      bmAudioToken++;
      const token = bmAudioToken;

      if (currentAudio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
      }

      const chunks = makeMalayAudioChunks(text);

      for (const chunk of chunks) {
        if (token !== bmAudioToken) return;
        await playMalayChunkMp3(chunk, token);
        await wait(0);
      }
    }

    function makeMalayAudioChunks(text) {
      const rawWords = text.trim().toLowerCase().split(/\s+/).filter(Boolean);
      const chunks = [];

      for (const word of rawWords) {
        // Keep compatibility if old wording ever appears.
        if (word === "seratus") {
          chunks.push("satu", "ratus");
          continue;
        }
        if (word === "seribu") {
          chunks.push("satu", "ribu");
          continue;
        }
        if (word === "sejuta") {
          chunks.push("satu", "juta");
          continue;
        }

        // For 12-19, play as separate chunks:
        // dua + belas, tiga + belas, etc.
        // This is faster than trying many phrase filenames first.
        chunks.push(word);
      }

      return chunks;
    }

    async function playMalayChunkMp3(chunk, token) {
      // First try a phrase file for 12-19, e.g.:
      // dua belas.MP3 / dua_belas.MP3 / dua-belas.MP3 / duabelas.MP3
      const phraseOk = await playMalayFileMp3(chunk, token, true);
      if (phraseOk) return true;

      // If phrase file is missing, fall back to separate word files:
      // dua.MP3 + belas.MP3
      if (chunk.includes(" ")) {
        let anyOk = false;
        const parts = chunk.split(/\s+/).filter(Boolean);
        for (const part of parts) {
          if (token !== bmAudioToken) return false;
          const ok = await playMalayFileMp3(part, token, false);
          anyOk = anyOk || ok;
          await wait(0);
        }
        return anyOk;
      }

      return false;
    }

    async function playMalayFileMp3(name, token, allowPhraseVariants) {
      const forms = makeMalayFileNameVariants(name, allowPhraseVariants);
      const extensions = [".MP3", ".mp3", ".Mp3"];

      for (const form of forms) {
        for (const ext of extensions) {
          const src = `assets/audio/bm/${form}${ext}`;

          // If this word already worked before, try that exact URL first next time.
          if (bmAudioUrlCache.get(name) === src) {
            const ok = await playOneMp3(src, token);
            if (ok) return true;
          }

          const ok = await playOneMp3(src, token);
          if (ok) {
            bmAudioUrlCache.set(name, src);
            return true;
          }
        }
      }

      console.warn("Missing BM audio file:", name);
      return false;
    }

    function makeMalayFileNameVariants(name, allowPhraseVariants) {
      const clean = name.trim().toLowerCase().replace(/\s+/g, " ");
      const variants = [clean];

      if (allowPhraseVariants && clean.includes(" ")) {
        variants.push(
          clean.replace(/\s+/g, "_"),
          clean.replace(/\s+/g, "-"),
          clean.replace(/\s+/g, "")
        );
      }

      return [...new Set(variants)];
    }

    function playOneMp3(src, token) {
      return new Promise(resolve => {
        if (token !== bmAudioToken) return resolve(false);

        const audio = new Audio(src);
        currentAudio = audio;

        // Faster BM MP3 playback for mobile.
        audio.playbackRate = 1.18;

        audio.onended = () => resolve(true);
        audio.onerror = () => resolve(false);

        audio.play().catch(err => {
          console.warn("Audio play blocked or failed:", err);
          resolve(false);
        });
      });
    }

    function wait(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function getPreferredVoice(lang) {
      const voices = window.speechSynthesis.getVoices();

      const femaleKeywords = [
        "female", "woman", "girl",
        "zira", "aria", "jenny", "samantha", "victoria", "susan",
        "karen", "moira", "tessa"
      ];

      function soundsFemale(voice) {
        const name = voice.name.toLowerCase();
        return femaleKeywords.some(keyword => name.includes(keyword));
      }

      function byLang(code) {
        return voices.filter(v => v.lang.toLowerCase() === code.toLowerCase());
      }

      function byLangPrefix(prefix) {
        return voices.filter(v => v.lang.toLowerCase().startsWith(prefix.toLowerCase()));
      }

      function chooseFemale(list) {
        return list.find(soundsFemale) || list[0] || null;
      }

      if (lang === "en") {
        const list = byLang("en-US").concat(byLang("en-GB")).concat(byLangPrefix("en"));
        return chooseFemale(list);
      }

      if (lang === "zh") {
        const list = byLang("zh-CN")
          .concat(byLang("zh-TW"))
          .concat(byLang("zh-HK"))
          .concat(byLangPrefix("zh"));
        return list[0] || null;
      }

      return null;
    }

    if ("speechSynthesis" in window) {
      window.speechSynthesis.onvoiceschanged = () => {
        window.speechSynthesis.getVoices();
      };
    }


    setLanguage("en");
      // BM audio tuning: word gap = 0ms, playbackRate = 1.18, teen fallback enabled
      // BM mobile preload enabled: common MP3 files preload after page open / first touch.
      // Audio load optimized: no phrase-file 404 attempts for 12-19; .MP3 tried first; preload/cache kept.
  </script>
