<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Base Ten Blocks Tool</title>

  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0;
      min-height: 100dvh;
      background: #f2f2f2;
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
      user-select: none;
    }

    .tool {
      width: min(96vw, 1120px);
      height: 100dvh;
      margin: 0 auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .display {
      text-align: center;
      font-size: clamp(42px, 7vw, 72px);
      font-weight: 800;
      line-height: 1;
      color: #222;
      letter-spacing: 3px;
      min-height: 76px;
      display: grid;
      place-items: center;
    }

    .main-area {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: 150px 1fr;
      gap: 12px;
    }

    .tray {
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 2px 10px rgba(0,0,0,.08);
      padding: 10px;
      display: grid;
      grid-template-columns: 1fr;
      align-content: start;
      gap: 10px;
      overflow-y: auto;
      touch-action: none;
    }

    .source-card {
      display: grid;
      place-items: center;
      gap: 4px;
      padding: 8px 4px;
      border-radius: 14px;
      border: 2px solid #ececec;
      background: #fff;
      font-weight: 800;
      font-size: 17px;
      color: #222;
      cursor: grab;
      touch-action: none;
    }

    .source-card:active {
      cursor: grabbing;
      transform: scale(.98);
    }

    .source-img {
      width: 72px;
      height: 72px;
      object-fit: contain;
      pointer-events: none;
    }

    .workspace {
      position: relative;
      min-height: 0;
      border: 3px dashed #c9c9c9;
      border-radius: 18px;
      background: #fff;
      overflow: hidden;
      touch-action: none;
    }

    .workspace-reset {
      position: absolute;
      right: 12px;
      bottom: 12px;
      z-index: 80;
      font-size: 14px;
      font-weight: 800;
      padding: 8px 14px;
      border-radius: 12px;
      border: 2px solid #333;
      background: #ffffff;
      color: #111;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,.12);
    }

    .workspace-reset:active {
      transform: scale(.98);
    }

    .hint {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: #b5b5b5;
      font-size: clamp(20px, 3vw, 34px);
      font-weight: 800;
      pointer-events: none;
      text-align: center;
      padding: 20px;
    }

    .block {
      position: absolute;
      object-fit: contain;
      touch-action: none;
      cursor: grab;
      z-index: 5;
    }

    .block:active {
      cursor: grabbing;
      z-index: 20;
    }

    /* PC dragged block size */
    .block.thousand { width: 172px; height: 172px; }
    .block.hundred { width: 153px; height: 153px; }

    /* 10 block is horizontal and specially larger */
    .block.ten { width: 140px; height: 38px; }

    .block.one { width: 58px; height: 58px; }

    .ghost {
      position: fixed;
      pointer-events: none;
      object-fit: contain;
      opacity: .9;
      z-index: 999;
      transform: translate(-50%, -50%);
    }

    @media (max-width: 700px) {
      .tool {
        width: 100vw;
        padding: 8px;
        gap: 8px;
      }

      .display {
        min-height: 58px;
        font-size: clamp(42px, 12vw, 62px);
      }

      .main-area {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column-reverse;
        gap: 8px;
      }

      .tray {
        flex: 0 0 112px;
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: flex-start;
        gap: 8px;
        overflow-x: auto;
        overflow-y: hidden;
        padding: 8px;
      }

      .source-card {
        min-width: 78px;
        height: 94px;
        font-size: 15px;
        padding: 6px;
      }

      .source-img {
        width: 54px;
        height: 54px;
      }

      .workspace {
        flex: 1;
        min-height: 280px;
      }

      .workspace-reset {
        right: 10px;
        bottom: 10px;
        font-size: 13px;
        padding: 7px 12px;
      }

      /* Mobile dragged block size */
      .block.thousand { width: 140px; height: 140px; }
      .block.hundred { width: 125px; height: 125px; }

      /* Mobile 10 block: wider and clearer */
      .block.ten { width: 112px; height: 32px; }

      .block.one { width: 50px; height: 50px; }
    }
  </style>
</head>

<body>
  <main class="tool">
    <div class="display" id="numberDisplay">0</div>

    <section class="main-area">
      <section class="tray">
        <div class="source-card" data-type="thousand" data-value="1000">
          <img class="source-img" src="assets/thousand.png" onerror="this.src='assets/thousand.svg'" alt="1000 block" />
          <span>1000</span>
        </div>

        <div class="source-card" data-type="hundred" data-value="100">
          <img class="source-img" src="assets/hundred.png" onerror="this.src='assets/hundred.svg'" alt="100 block" />
          <span>100</span>
        </div>

        <div class="source-card" data-type="ten" data-value="10">
          <img class="source-img" src="assets/ten.png" onerror="this.src='assets/ten.svg'" alt="10 block" />
          <span>10</span>
        </div>

        <div class="source-card" data-type="one" data-value="1">
          <img class="source-img" src="assets/one.png" onerror="this.src='assets/one.svg'" alt="1 block" />
          <span>1</span>
        </div>
      </section>

      <section class="workspace" id="workspace">
        <div class="hint" id="hint">Drag blocks here</div>
        <button class="workspace-reset" id="resetBtn" type="button">Reset</button>
      </section>
    </section>
  </main>

  <script>
    const workspace = document.getElementById("workspace");
    const display = document.getElementById("numberDisplay");
    const hint = document.getElementById("hint");
    const resetBtn = document.getElementById("resetBtn");
    const sources = document.querySelectorAll(".source-card[data-type]");

    let total = 0;
    let currentDrag = null;
    const placedBlocks = [];

    sources.forEach(source => source.addEventListener("pointerdown", startFromSource));
    resetBtn.addEventListener("click", reset);
    resetBtn.addEventListener("pointerdown", e => e.stopPropagation());

    function startFromSource(e) {
      e.preventDefault();

      const source = e.currentTarget;
      const type = source.dataset.type;
      const value = Number(source.dataset.value);
      const img = source.querySelector("img");

      const ghost = document.createElement("img");
      ghost.src = img.currentSrc || img.src;
      ghost.className = "ghost";
      setGhostSize(ghost, type);
      document.body.appendChild(ghost);

      currentDrag = { mode: "new", pointerId: e.pointerId, type, value, ghost };
      moveGhost(e.clientX, e.clientY);

      source.setPointerCapture(e.pointerId);
      source.addEventListener("pointermove", onSourcePointerMove);
      source.addEventListener("pointerup", onSourcePointerUp);
      source.addEventListener("pointercancel", onSourcePointerUp);
    }

    function setGhostSize(ghost, type) {
      const small = window.matchMedia("(max-width: 700px)").matches;
      const size = {
        thousand: small ? ["118px", "118px"] : ["150px", "150px"],
        hundred: small ? ["104px", "104px"] : ["132px", "132px"],
        ten: small ? ["112px", "32px"] : ["140px", "38px"],
        one: small ? ["50px", "50px"] : ["58px", "58px"]
      }[type];

      ghost.style.width = size[0];
      ghost.style.height = size[1];
    }

    function onSourcePointerMove(e) {
      if (!currentDrag) return;
      moveGhost(e.clientX, e.clientY);
    }

    function onSourcePointerUp(e) {
      if (!currentDrag) return;

      const source = e.currentTarget;
      source.removeEventListener("pointermove", onSourcePointerMove);
      source.removeEventListener("pointerup", onSourcePointerUp);
      source.removeEventListener("pointercancel", onSourcePointerUp);

      const rect = workspace.getBoundingClientRect();
      const isInside =
        e.clientX >= rect.left &&
        e.clientX <= rect.right &&
        e.clientY >= rect.top &&
        e.clientY <= rect.bottom;

      if (isInside) {
        addBlock(currentDrag.type, currentDrag.value, e.clientX - rect.left, e.clientY - rect.top);
      }

      currentDrag.ghost.remove();
      currentDrag = null;
    }

    function moveGhost(x, y) {
      if (!currentDrag || !currentDrag.ghost) return;
      currentDrag.ghost.style.left = x + "px";
      currentDrag.ghost.style.top = y + "px";
    }

    function addBlock(type, value, x, y) {
      const block = document.createElement("img");
      block.src = `assets/${type}.png`;
      block.onerror = () => block.src = `assets/${type}.svg`;
      block.className = `block ${type}`;
      block.dataset.value = value;

      workspace.appendChild(block);

      requestAnimationFrame(() => {
        const maxX = workspace.clientWidth - block.offsetWidth;
        const maxY = workspace.clientHeight - block.offsetHeight;

        block.style.left = clamp(x - block.offsetWidth / 2, 0, maxX) + "px";
        block.style.top = clamp(y - block.offsetHeight / 2, 0, maxY) + "px";
      });

      block.addEventListener("pointerdown", startMoveExisting);
      placedBlocks.push(block);
      total += value;
      updateDisplay();
    }

    function startMoveExisting(e) {
      e.preventDefault();

      const block = e.currentTarget;
      const rect = workspace.getBoundingClientRect();
      const blockRect = block.getBoundingClientRect();

      currentDrag = {
        mode: "move",
        block,
        offsetX: e.clientX - blockRect.left,
        offsetY: e.clientY - blockRect.top,
        workspaceRect: rect
      };

      block.setPointerCapture(e.pointerId);
      block.addEventListener("pointermove", moveExisting);
      block.addEventListener("pointerup", stopMoveExisting);
      block.addEventListener("pointercancel", stopMoveExisting);
    }

    function moveExisting(e) {
      if (!currentDrag || currentDrag.mode !== "move") return;

      const { block, offsetX, offsetY, workspaceRect } = currentDrag;
      const maxX = workspace.clientWidth - block.offsetWidth;
      const maxY = workspace.clientHeight - block.offsetHeight;

      block.style.left = clamp(e.clientX - workspaceRect.left - offsetX, 0, maxX) + "px";
      block.style.top = clamp(e.clientY - workspaceRect.top - offsetY, 0, maxY) + "px";
    }

    function stopMoveExisting(e) {
      const block = e.currentTarget;
      block.removeEventListener("pointermove", moveExisting);
      block.removeEventListener("pointerup", stopMoveExisting);
      block.removeEventListener("pointercancel", stopMoveExisting);
      currentDrag = null;
    }

    function reset() {
      placedBlocks.splice(0).forEach(block => block.remove());
      total = 0;
      updateDisplay();
    }

    function updateDisplay() {
      display.textContent = total.toString();
      hint.style.display = total === 0 ? "grid" : "none";
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }
  </script>
</body>
</html>
